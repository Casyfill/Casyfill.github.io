{% extends "base.html" %}
{% block title %}{{ page.title }} — {{ SITENAME }}{% endblock %}
{% block content %}
<article class="article{% if page.template_kind == 'listing' %} listing{% endif %}">
  {% if not page.hide_title %}<h1>{{ page.title }}</h1>{% endif %}
  {% if page.subtitle %}<div class="post-meta">{{ page.subtitle }}</div>{% endif %}
  {{ page.content }}
</article>
{% endblock %}
